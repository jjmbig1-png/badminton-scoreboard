<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Badminton Scoreboard</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

.container{
display:flex;
justify-content:space-around;
margin-top:40px;
}

.team{
width:45%;
padding:20px;
border-radius:20px;
}

.score{
font-size:120px;
cursor:pointer;
}

.name{
font-size:30px;
margin-bottom:10px;
}

.serve{
font-size:30px;
color:yellow;
}

.winner{
background:#ffd400;
color:black;
}

.timer{
font-size:50px;
margin-top:20px;
}

.set{
font-size:30px;
}

input{
font-size:20px;
text-align:center;
}

</style>
</head>

<body>

<h1>Badminton Scoreboard</h1>

<div>
<input id="teamAname" value="TEAM A">
<input id="teamBname" value="TEAM B">
</div>

<div class="container">

<div id="sideA" class="team">

<div class="name" id="teamA"></div>
<div class="serve" id="serveA"></div>

<div class="score" onclick="addScore('A')" id="scoreA">0</div>

<div class="set">SET : <span id="setA">0</span></div>

</div>

<div id="sideB" class="team">

<div class="name" id="teamB"></div>
<div class="serve" id="serveB"></div>

<div class="score" onclick="addScore('B')" id="scoreB">0</div>

<div class="set">SET : <span id="setB">0</span></div>

</div>

</div>

<div class="timer" id="timer"></div>

<script>

let scoreA=0
let scoreB=0

let setA=0
let setB=0

let server="A"

function addScore(team){

if(team==="A") scoreA++
if(team==="B") scoreB++

server=team

checkGame()
update()

}

function checkGame(){

if(scoreA===11 || scoreB===11){
speak("Interval")
startTimer(60)
}

if(
(scoreA>=21 || scoreB>=21) &&
Math.abs(scoreA-scoreB)>=2
){
endSet()
}

if(scoreA===30 || scoreB===30){
endSet()
}

}

function endSet(){

let winner

if(scoreA>scoreB){
setA++
winner="A"
document.getElementById("sideA").classList.add("winner")
}
else{
setB++
winner="B"
document.getElementById("sideB").classList.add("winner")
}

speak("Game won by team "+winner)

startTimer(120)

scoreA=0
scoreB=0

if(setA===2 || setB===2){
speak("Match won")
}

update()

}

function startTimer(sec){

let t=sec

let timer=setInterval(()=>{

t--
document.getElementById("timer").innerText=t

if(t<=0){
clearInterval(timer)
document.getElementById("timer").innerText=""
}

},1000)

}

function speak(text){

let msg=new SpeechSynthesisUtterance(text)
msg.lang="en-US"
speechSynthesis.speak(msg)

}

function update(){

document.getElementById("scoreA").innerText=scoreA
document.getElementById("scoreB").innerText=scoreB

document.getElementById("setA").innerText=setA
document.getElementById("setB").innerText=setB

document.getElementById("teamA").innerText=document.getElementById("teamAname").value
document.getElementById("teamB").innerText=document.getElementById("teamBname").value

document.getElementById("serveA").innerText= server==="A" ? "●" : ""
document.getElementById("serveB").innerText= server==="B" ? "●" : ""

}

update()

</script>

</body>
</html>
